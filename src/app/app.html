<div class="cont-principal">
  <h1 class="title">{{ title }}</h1>

  <div id="agregacion">
    <label for="nuevo">Nueva Figurita   </label>
    <input
      id="nuevo"
      [(ngModel)] = "nuevaFigurita"
      placeholder="Nombre del jugador"
    ><!-- ngModel da valor a la variable nuevaFigurita-->
    <button (click)="agregar()">Agregar</button>
  </div>

  <div id="lista">
      <ul>
        <li *ngFor="let jugador of figuritas; let i = index">
          <h2>{{ jugador.nombre }}</h2>
          <div class="botones">
            <button (click)="eliminar(i)" class="eliminar">Eliminar</button>
            <button
              class="favorito"
              (click)="favorito(jugador)"
              [style.background-color]="jugador.favorito ? 'gold' : 'gray'"
              [style.color]="jugador.favorito ? 'black' : 'white'">
              ★
            </button>
          </div>
        </li>
      </ul>
  </div>
  
</div>
